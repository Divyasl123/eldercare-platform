<!DOCTYPE html>
<html>
<head>
    <title>Confirm Booking - ElderCare+</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body{
            margin:0;
            font-family:'Segoe UI', sans-serif;
            background:#f4f8fb;
        }

        .container{
            max-width:500px;
            margin:60px auto;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 8px 20px rgba(0,0,0,0.08);
        }

        h2{
            text-align:center;
            color:#2E86C1;
            margin-bottom:25px;
        }

        label{
            display:block;
            margin-top:15px;
            font-weight:500;
        }

        input, select{
            width:100%;
            padding:10px;
            margin-top:5px;
            border-radius:6px;
            border:1px solid #ddd;
            font-size:14px;
        }

        input[readonly]{
            background:#e9ecef;
        }

        button{
            margin-top:25px;
            width:100%;
            padding:12px;
            background:#2E86C1;
            border:none;
            color:white;
            font-size:16px;
            border-radius:6px;
            cursor:pointer;
        }

        button:hover{
            background:#1f618d;
        }

        .success-msg{
            color:green;
            text-align:center;
            margin-top:15px;
            font-weight:500;
        }

        .error-msg{
            color:red;
            text-align:center;
            margin-top:15px;
            font-weight:500;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Confirm Service Booking</h2>

    <form id="bookingForm">

        <label>Selected Service</label>
        <input type="text" id="service" readonly>

        <label>Selected Caregiver</label>
        <input type="text" id="caregiverName" readonly>

        <label>Patient Name</label>
        <input type="text" id="patientName" placeholder="Enter patient name">

        <label>Select Date</label>
        <input type="date" id="date">

        <label>Duration</label>
        <select id="duration">
            <option value="">Select Duration</option>
            <option value="Hourly">Hourly</option>
            <option value="Daily">Daily</option>
            <option value="Weekly">Weekly</option>
        </select>

        <button type="submit">Confirm Booking</button>

    </form>

    <div id="message"></div>

</div>

<script>

    // Fill selected service & caregiver from localStorage
    document.getElementById("service").value =
        localStorage.getItem("selectedService") || "";

    document.getElementById("caregiverName").value =
        localStorage.getItem("selectedCaregiver") || "";

    document.getElementById("bookingForm")
    .addEventListener("submit", async function(e){

        e.preventDefault();

        const bookingData = {
            service: document.getElementById("service").value,
            caregiverName: document.getElementById("caregiverName").value,
            patientName: document.getElementById("patientName").value,
            date: document.getElementById("date").value,
            duration: document.getElementById("duration").value
        };

        if(!bookingData.service || !bookingData.caregiverName ||
           !bookingData.patientName || !bookingData.date || !bookingData.duration){

            document.getElementById("message").innerHTML =
                "<div class='error-msg'>Please fill all fields</div>";
            return;
        }

        try{

            const response = await fetch("http://localhost:5000/api/bookings",{
                method:"POST",
                headers:{ "Content-Type":"application/json" },
                body: JSON.stringify(bookingData)
            });

            const data = await response.json();

            if(response.ok){

                document.getElementById("message").innerHTML =
                    "<div class='success-msg'>Booking Successful!</div>";

                // Reset form (except readonly fields)
                document.getElementById("patientName").value = "";
                document.getElementById("date").value = "";
                document.getElementById("duration").value = "";

            }else{
                document.getElementById("message").innerHTML =
                    "<div class='error-msg'>" + data.message + "</div>";
            }

        }catch(err){
            document.getElementById("message").innerHTML =
                "<div class='error-msg'>Server Error</div>";
        }

    });

</script>

</body>
</html>
