<!DOCTYPE html>
<html>
<head>
    <title>Manage Bookings - Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #F4F8FB;
        }

        .sidebar {
            height: 100vh;
            background-color: #2E86C1;
            padding-top: 30px;
            color: white;
        }

        .sidebar h4 {
            text-align: center;
            margin-bottom: 40px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background-color: #3498DB;
        }

        .main-content {
            padding: 40px;
        }

        .booking-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            color: white;
        }

        .Pending { background: #f39c12; }
        .Confirmed { background: #3498db; }
        .Active { background: #2ecc71; }
        .Completed { background: #27ae60; }
        .Cancelled { background: #e74c3c; }

        .action-btn {
            margin-bottom: 6px;
        }

    </style>
</head>

<body>

<div class="container-fluid">
<div class="row">

    <!-- Sidebar -->
    <div class="col-md-3 col-lg-2 sidebar">
        <h4>Admin Panel</h4>
        <a href="admin.html">Dashboard</a>
        <a href="adminCaregivers.html">Manage Caregivers</a>
        <a href="adminBookings.html">Manage Bookings</a>
        <a href="dashboard.html">User Panel</a>
        <a href="login.html">Logout</a>
    </div>

    <!-- Main Content -->
    <div class="col-md-9 col-lg-10 main-content">
        <h2 class="mb-4">Manage Bookings</h2>

        <div class="row g-4" id="bookingContainer">
        </div>
    </div>

</div>
</div>

<script>

async function loadBookings() {
    try {
        const res = await fetch("http://localhost:5000/api/bookings");
        const bookings = await res.json();

        const container = document.getElementById("bookingContainer");
        container.innerHTML = "";

        bookings.forEach(booking => {

            container.innerHTML += `
                <div class="col-md-6">
                    <div class="booking-card">
                        <h5>${booking.service}</h5>
                        <p><strong>Patient:</strong> ${booking.patientName}</p>
                        <p><strong>Caregiver:</strong> ${booking.caregiverName}</p>
                        <p><strong>Date:</strong> ${new Date(booking.date).toDateString()}</p>
                        <p><strong>Duration:</strong> ${booking.duration}</p>

                        <p>
                            <strong>Status:</strong>
                            <span class="status-badge ${booking.status}">
                                ${booking.status}
                            </span>
                        </p>

                        <div class="d-grid gap-2">

                            <button class="btn btn-primary action-btn"
                            onclick="updateStatus('${booking._id}','Confirmed')">
                            Confirm
                            </button>

                            <button class="btn btn-success action-btn"
                            onclick="updateStatus('${booking._id}','Active')">
                            Activate
                            </button>

                            <button class="btn btn-info action-btn"
                            onclick="updateStatus('${booking._id}','Completed')">
                            Complete
                            </button>

                            <button class="btn btn-warning action-btn"
                            onclick="updateStatus('${booking._id}','Cancelled')">
                            Cancel
                            </button>

                            <button class="btn btn-dark action-btn"
                            onclick="deleteBooking('${booking._id}')">
                            Delete Permanently
                            </button>

                        </div>
                    </div>
                </div>
            `;
        });

    } catch (error) {
        console.log("Error loading bookings:", error);
    }
}

async function updateStatus(id, status) {

    await fetch(`http://localhost:5000/api/bookings/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status })
    });

    loadBookings();
}

async function deleteBooking(id) {

    if (!confirm("Delete permanently?")) return;

    await fetch(`http://localhost:5000/api/bookings/${id}`, {
        method: "DELETE"
    });

    loadBookings();
}

loadBookings();

</script>

</body>
</html>
