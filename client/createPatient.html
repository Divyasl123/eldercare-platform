<!DOCTYPE html>
<html>
<head>
    <title>Create Elderly Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#F4F8FB; font-family:Segoe UI;">

<div class="container">
    <div class="card mt-5 p-4 shadow" style="max-width:600px; margin:auto;">
        <h3 class="text-center text-primary mb-4">Create Elderly Profile</h3>

        <form id="patientForm">

            <input type="text" class="form-control mb-3" id="name" placeholder="Elderly Name" required>

            <input type="number" class="form-control mb-3" id="age" placeholder="Age" required>

            <select class="form-control mb-3" id="gender" required>
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>

            <input type="text" class="form-control mb-3" id="condition" placeholder="Medical Condition">

            <select class="form-control mb-3" id="service" required>
                <option value="">Select Service</option>
                <option>Nursing Care</option>
                <option>Physiotherapy</option>
                <option>Elderly Attendant</option>
                <option>Post-Hospital Care</option>
            </select>

            <input type="text" class="form-control mb-3" id="contact" placeholder="Emergency Contact Number" required>

            <button class="btn btn-primary w-100">Save Profile</button>

        </form>
    </div>
</div>

<script>

document.getElementById("patientForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const patientData = {
        name: document.getElementById("name").value.trim(),
        age: document.getElementById("age").value.trim(),
        gender: document.getElementById("gender").value.trim(),
        condition: document.getElementById("condition").value.trim(),
        service: document.getElementById("service").value.trim(),
        contact: document.getElementById("contact").value.trim()
    };

    try {

        const response = await fetch("http://localhost:5000/api/patients", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(patientData)
        });

        const data = await response.json();

        if(response.ok){
            alert("✅ Patient profile created successfully");
            document.getElementById("patientForm").reset();
        } else {
            alert(data.message);
        }

    } catch(error){
        alert("❌ Server not running");
    }

});

</script>

</body>
</html>
