<!DOCTYPE html>
<html>
<head>
    <title>User Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #F4F8FB;
        }

        .sidebar {
            height: 100vh;
            background: linear-gradient(to bottom, #2E86C1, #1B4F72);
            padding-top: 30px;
            color: white;
        }

        .sidebar h4 {
            text-align: center;
            margin-bottom: 40px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background-color: #3498DB;
        }

        .main-content {
            padding: 40px;
        }

        .welcome-card, .stat-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .stat-card {
            text-align: center;
        }

        .stat-card h3 {
            color: #2E86C1;
            font-size: 32px;
        }

    </style>
</head>
<body>

<div class="container-fluid">
<div class="row">

    <!-- Sidebar -->
    <div class="col-md-3 col-lg-2 sidebar">
        <h4>ElderCare+</h4>
        <a href="dashboard.html">Dashboard</a>
        <a href="services.html">Browse Services</a>
        <a href="createPatient.html">Create Patient</a>
        <a href="myPatients.html">My Patients</a>
        <a href="myBookings.html">My Bookings</a>
        <a href="login.html">Logout</a>
    </div>

    <!-- Main -->
    <div class="col-md-9 col-lg-10 main-content">

        <div class="welcome-card mb-4">
            <h2>Welcome Back 👋</h2>
            <p class="text-muted">Manage your elderly healthcare services easily and securely.</p>
        </div>

        <div class="row">

            <div class="col-md-4">
                <div class="stat-card">
                    <h3 id="totalBookings">0</h3>
                    <p>Total Bookings</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="stat-card">
                    <h3 id="activeServices">0</h3>
                    <p>Active Services</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="stat-card">
                    <h3 id="pendingRequests">0</h3>
                    <p>Pending Requests</p>
                </div>
            </div>

        </div>

    </div>

</div>
</div>

<script>
async function loadDashboard() {
    try {
        const res = await fetch("http://localhost:5000/api/bookings");
        const bookings = await res.json();

        const total = bookings.length;
        const active = bookings.filter(b => b.status === "Confirmed").length;
        const pending = bookings.filter(b => b.status === "Pending").length;

        document.getElementById("totalBookings").innerText = total;
        document.getElementById("activeServices").innerText = active;
        document.getElementById("pendingRequests").innerText = pending;

    } catch (err) {
        console.error("Error loading dashboard", err);
    }
}

loadDashboard();
</script>

</body>
</html>
