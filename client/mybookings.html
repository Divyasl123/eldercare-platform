<!DOCTYPE html>
<html>
<head>
    <title>My Bookings - ElderCare+</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#F4F8FB;
            font-family:'Segoe UI', sans-serif;
        }

        .booking-card{
            background:white;
            padding:20px;
            border-radius:15px;
            box-shadow:0 6px 15px rgba(0,0,0,0.08);
            margin-bottom:20px;
        }

        .status-badge{
            padding:6px 12px;
            border-radius:20px;
            font-size:14px;
        }

        .Pending{ background:#f39c12; color:white; }
        .Confirmed{ background:#27ae60; color:white; }
        .Active{ background:#2980b9; color:white; }
        .Completed{ background:#2ecc71; color:white; }
        .Cancelled{ background:#e74c3c; color:white; }

    </style>
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">My Booking History</h2>

    <div id="bookingList"></div>

    <div class="text-center mt-4">
        <a href="dashboard.html" class="btn btn-secondary">
            Back to Dashboard
        </a>
    </div>

</div>

<script>

async function loadBookings(){

    const res = await fetch("http://localhost:5000/api/bookings");
    const bookings = await res.json();

    const container = document.getElementById("bookingList");
    container.innerHTML = "";

    if(bookings.length === 0){
        container.innerHTML = "<p class='text-center'>No bookings found.</p>";
        return;
    }

    bookings.forEach(b => {

        container.innerHTML += `
            <div class="booking-card">
                <h5>${b.service}</h5>
                <p><strong>Caregiver:</strong> ${b.caregiverName}</p>
                <p><strong>Patient:</strong> ${b.patientName}</p>
                <p><strong>Date:</strong> ${new Date(b.date).toDateString()}</p>
                <p><strong>Duration:</strong> ${b.duration}</p>

                <span class="status-badge ${b.status}">
                    ${b.status}
                </span>

                ${
                    b.status === "Pending"
                    ? `<button class="btn btn-sm btn-danger float-end"
                        onclick="cancelBooking('${b._id}')">
                        Cancel
                       </button>`
                    : ""
                }

            </div>
        `;
    });
}

async function cancelBooking(id){

    await fetch(`http://localhost:5000/api/bookings/${id}`,{
        method:"PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status: "Cancelled" })
    });

    loadBookings();
}

loadBookings();

</script>

</body>
</html>
