<!DOCTYPE html>
<html>
<head>
    <title>Login - ElderCare+</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #d6eaf8, #aed6f1);
            font-family: 'Segoe UI', sans-serif;
        }

        .login-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
        }

        .brand h3 {
            color: #2E86C1;
            font-weight: bold;
        }

        .btn-primary {
            background-color: #2E86C1;
            border: none;
        }

        .btn-primary:hover {
            background-color: #1B4F72;
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-eye {
            cursor: pointer;
            position: absolute;
            right: 15px;
            top: 38px;
        }

        .forgot-link {
            font-size: 14px;
            text-decoration: none;
            color: #2E86C1;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

<div class="login-container">

    <div class="login-card">

        <div class="text-center mb-4 brand">
            <h3>ElderCare+</h3>
            <p class="text-muted">Login to Continue</p>
        </div>

        <form id="loginForm">

            <div class="mb-3">
                <label>Email Address</label>
                <input type="email" id="email" class="form-control" required>
            </div>

            <div class="mb-3 password-wrapper">
                <label>Password</label>
                <input type="password" id="password" class="form-control" required>
                <span class="toggle-eye" onclick="togglePassword()">👁</span>
            </div>

            <div class="text-end mb-3">
                <a href="forgotPassword.html" class="forgot-link">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Login
            </button>

            <p id="message" class="text-center mt-3"></p>

            <div class="text-center mt-3">
                <small>
                    Don't have account?
                    <a href="register.html">Register</a>
                </small>
            </div>

        </form>

    </div>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const message = document.getElementById("message");

    message.innerText = "";
    message.style.color = "red";

    try {

        const response = await fetch("http://localhost:5000/api/users/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if(response.ok){

            // Save user info
            localStorage.setItem("userName", data.user.name);
            localStorage.setItem("userRole", data.user.role);
            localStorage.setItem("userId", data.user.id);

            message.style.color = "green";
            message.innerText = "Login Successful ✅";

            // Role-based redirect
            setTimeout(() => {

                if(data.user.role === "admin"){
                    window.location.href = "admin.html";
                } else {
                    window.location.href = "dashboard.html";
                }

            }, 1000);

        } else {
            message.innerText = data.message || "Invalid credentials ❌";
        }

    } catch(error){
        message.innerText = "Server error ❌";
    }
});

function togglePassword(){
    const input = document.getElementById("password");
    input.type = input.type === "password" ? "text" : "password";
}

</script>

</body>
</html>
