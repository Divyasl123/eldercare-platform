<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Elderly Profiles</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            margin: 0;
            padding: 20px;
        }

        h2 {
            text-align: center;
            color: #2c3e50;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background-color: #3498db;
            color: white;
        }

        button {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
        }

        .back-btn {
            background: #555;
            color: white;
            margin-top: 20px;
        }

        #errorMsg {
            text-align: center;
            color: red;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <h2>My Elderly Profiles</h2>

    <p id="errorMsg"></p>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Gender</th>
                <th>Medical Condition</th>
                <th>Service</th>
                <th>Contact</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="patientsTableBody">
        </tbody>
    </table>

    <div style="text-align:center;">
        <button class="back-btn" onclick="window.location.href='dashboard.html'">
            Back to Dashboard
        </button>
    </div>

<script>
const API_BASE = "http://127.0.0.1:5000";

async function loadPatients() {
    const tableBody = document.getElementById("patientsTableBody");
    const errorMsg = document.getElementById("errorMsg");

    try {
        const response = await fetch(`${API_BASE}/api/patients`);
        const result = await response.json();

        if (!result.success) {
            throw new Error("Failed to fetch patients");
        }

        tableBody.innerHTML = "";
        errorMsg.innerText = "";

        result.data.forEach(patient => {
            const row = `
                <tr>
                    <td>${patient.name}</td>
                    <td>${patient.age}</td>
                    <td>${patient.gender}</td>
                    <td>${patient.condition || "N/A"}</td>
                    <td>${patient.service}</td>
                    <td>${patient.contact}</td>
                    <td>
                        <button class="delete-btn" onclick="deletePatient('${patient._id}')">
                            Delete
                        </button>
                    </td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });

    } catch (error) {
        errorMsg.innerText = "Unable to load patients. Make sure backend is running.";
        console.error(error);
    }
}

async function deletePatient(id) {
    try {
        await fetch(`${API_BASE}/api/patients/${id}`, {
            method: "DELETE"
        });
        loadPatients();
    } catch (error) {
        alert("Failed to delete patient");
    }
}

window.onload = loadPatients;
</script>

</body>
</html>
