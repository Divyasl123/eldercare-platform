<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - ElderCare+</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #1B4F72, #2E86C1);
            font-family: 'Segoe UI', sans-serif;
        }

        .admin-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .admin-card {
            background: white;
            padding: 45px;
            border-radius: 20px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
        }

        .admin-title {
            text-align: center;
            margin-bottom: 25px;
        }

        .admin-title h3 {
            color: #2E86C1;
            font-weight: 600;
        }

        .btn-primary {
            background-color: #2E86C1;
            border: none;
        }

        .btn-primary:hover {
            background-color: #154360;
        }

        .warning-text {
            font-size: 13px;
            color: #dc3545;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="admin-container">

    <div class="admin-card">

        <div class="admin-title">
            <h3>Admin Panel Login</h3>
            <p class="text-muted">Authorized Access Only</p>
        </div>

        <p class="warning-text">
            ⚠ This area is restricted to administrators.
        </p>

        <form id="adminLoginForm">

            <div class="mb-3">
                <label class="form-label">Admin Email</label>
                <input type="email" id="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-2">
                Login as Admin
            </button>

            <p id="message" class="mt-3 text-center"></p>

            <div class="text-center mt-3">
                <small>
                    <a href="index.html">← Back to Home</a>
                </small>
            </div>

        </form>

    </div>

</div>

<script>

document.getElementById("adminLoginForm").addEventListener("submit", function(e){
    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const message = document.getElementById("message");

    // Simple demo admin credentials
    const adminEmail = "admin@gmail.com";
    const adminPassword = "admin123";

    if(email === adminEmail && password === adminPassword){
        message.style.color = "green";
        message.innerText = "Admin Login Successful ✅";

        setTimeout(()=>{
            window.location.href = "admin.html";
        },1000);
    } else {
        message.style.color = "red";
        message.innerText = "Invalid Admin Credentials ❌";
    }
});

</script>

</body>
</html>
