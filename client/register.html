<!DOCTYPE html>
<html>
<head>
    <title>Register - ElderCare+</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #d6eaf8, #aed6f1);
            font-family: 'Segoe UI', sans-serif;
        }

        .register-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .btn-primary {
            background-color: #2E86C1;
            border: none;
        }

        .btn-primary:hover {
            background-color: #1B4F72;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #2E86C1;
        }

        .logo-title {
            font-weight: bold;
            color: #2E86C1;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 100vh;">

        <div class="col-md-6 col-lg-5">
            <div class="register-card">

                <h3 class="text-center mb-4 logo-title">ElderCare+</h3>
                <h5 class="text-center mb-4 text-muted">Create Your Account</h5>

                <form id="registerForm">

                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="name" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="password" required>
                            <button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">👁</button>
                        </div>
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary">
                            Register
                        </button>
                    </div>

                    <p id="message" class="text-center mt-3"></p>

                    <div class="text-center mt-3">
                        Already have an account?
                        <a href="login.html">Login</a>
                    </div>

                </form>

            </div>
        </div>

    </div>
</div>

<script>
document.getElementById("registerForm").addEventListener("submit", async function(e) {

    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const message = document.getElementById("message");

    message.innerText = "";
    message.style.color = "red";

    const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

    if (!emailPattern.test(email)) {
        message.innerText = "Invalid Email Format ❌";
        return;
    }

    if (password.length < 6) {
        message.innerText = "Password must be at least 6 characters ❌";
        return;
    }

    try {

        const response = await fetch("http://localhost:5000/api/users/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, email, password })
        });

        const data = await response.json();

        if (response.ok) {
            message.style.color = "green";
            message.innerText = "Registration Successful ✅ Redirecting...";
            setTimeout(() => {
                window.location.href = "login.html";
            }, 1500);
        } else {
            message.innerText = data.message || "Registration Failed ❌";
        }

    } catch (error) {
        message.innerText = "Server Error ❌";
    }

});

function togglePassword() {
    const input = document.getElementById("password");
    input.type = input.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
