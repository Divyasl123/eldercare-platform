<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard - ElderCare+</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            margin:0;
            font-family:'Segoe UI', sans-serif;
            background:#F4F8FB;
        }

        .sidebar{
            height:100vh;
            background:linear-gradient(180deg,#1F618D,#2E86C1);
            color:white;
            padding-top:30px;
        }

        .sidebar h4{
            text-align:center;
            margin-bottom:30px;
            font-weight:bold;
        }

        .sidebar a{
            display:block;
            padding:12px 20px;
            color:white;
            text-decoration:none;
            transition:0.3s;
        }

        .sidebar a:hover{
            background:#3498DB;
        }

        .main-content{
            padding:40px;
        }

        .card{
            border:none;
            border-radius:15px;
            box-shadow:0 4px 15px rgba(0,0,0,0.08);
        }

        .card h3{
            font-weight:bold;
        }

        .title{
            font-weight:bold;
            margin-bottom:30px;
        }
    </style>
</head>

<body>

<div class="container-fluid">
<div class="row">

    <!-- Sidebar -->
    <div class="col-md-3 col-lg-2 sidebar">
        <h4>Admin Panel</h4>

        <a href="admin.html">Dashboard</a>
        <a href="adminCaregivers.html">Manage Caregivers</a>
        <a href="adminBookings.html">Manage Bookings</a>
        <a href="dashboard.html">User Panel</a>
        <a href="adminPatients.html">View Patients</a>
        <a href="login.html">Logout</a>
    </div>

    <!-- Main -->
    <div class="col-md-9 col-lg-10 main-content">

        <h2 class="title">Platform Overview</h2>

        <div class="row g-4">

            <div class="col-md-3">
                <div class="card p-4 text-center">
                    <h6>Total Bookings</h6>
                    <h3 id="totalBookings">0</h3>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card p-4 text-center">
                    <h6>Confirmed (Active)</h6>
                    <h3 id="confirmedBookings">0</h3>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card p-4 text-center">
                    <h6>Pending</h6>
                    <h3 id="pendingBookings">0</h3>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card p-4 text-center">
                    <h6>Cancelled</h6>
                    <h3 id="cancelledBookings">0</h3>
                </div>
            </div>

        </div>

    </div>
</div>
</div>

<script>

async function loadAdminStats(){
    try{

        const bookingsRes = await fetch("http://localhost:5000/api/bookings");
        const bookings = await bookingsRes.json();

        const total = bookings.length;
        const confirmed = bookings.filter(b => b.status === "Confirmed").length;
        const pending = bookings.filter(b => b.status === "Pending").length;
        const cancelled = bookings.filter(b => b.status === "Cancelled").length;

        document.getElementById("totalBookings").innerText = total;
        document.getElementById("confirmedBookings").innerText = confirmed;
        document.getElementById("pendingBookings").innerText = pending;
        document.getElementById("cancelledBookings").innerText = cancelled;

    }catch(err){
        console.log("Admin dashboard error:", err);
    }
}

loadAdminStats();

</script>

</body>
</html>
