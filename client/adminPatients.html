<!DOCTYPE html>
<html>
<head>
    <title>Admin - View Patients</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f7fb;
        }

        .sidebar {
            width: 220px;
            height: 100vh;
            background: #2c3e50;
            color: white;
            position: fixed;
            padding: 20px;
        }

        .sidebar h2 {
            margin-top: 0;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            margin: 15px 0;
        }

        .content {
            margin-left: 240px;
            padding: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #3498db;
            color: white;
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
            padding: 6px 10px;
            border: none;
            cursor: pointer;
        }

        .error {
            color: red;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Admin Panel</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="adminPatients.html">View Patients</a>
    <a href="adminBookings.html">Manage Bookings</a>
</div>

<div class="content">
    <h2>All Registered Patients</h2>

    <p id="errorMsg" class="error"></p>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Gender</th>
                <th>Condition</th>
                <th>Service</th>
                <th>Contact</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="patientTable"></tbody>
    </table>
</div>

<script>

const API_BASE = "http://127.0.0.1:5000";

async function loadPatients() {
    const table = document.getElementById("patientTable");
    const errorMsg = document.getElementById("errorMsg");

    try {
        const res = await fetch(`${API_BASE}/api/patients`);
        const result = await res.json();

        if (!result.success) {
            throw new Error("Failed to load");
        }

        table.innerHTML = "";
        errorMsg.innerText = "";

        result.data.forEach(patient => {
            table.innerHTML += `
                <tr>
                    <td>${patient.name}</td>
                    <td>${patient.age}</td>
                    <td>${patient.gender}</td>
                    <td>${patient.condition}</td>
                    <td>${patient.service}</td>
                    <td>${patient.contact}</td>
                    <td>
                        <button class="delete-btn"
                            onclick="deletePatient('${patient._id}')">
                            Delete
                        </button>
                    </td>
                </tr>
            `;
        });

    } catch (err) {
        errorMsg.innerText = "Unable to load patients.";
        console.error(err);
    }
}

async function deletePatient(id) {
    await fetch(`${API_BASE}/api/patients/${id}`, {
        method: "DELETE"
    });
    loadPatients();
}

window.onload = loadPatients;

</script>

</body>
</html>
